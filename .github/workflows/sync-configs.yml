name: Sync Configs to kubenode1

on:
  push:
    branches:
      - sync
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted]
    
    steps:
      - name: Checkout sync branch
        uses: actions/checkout@v4
        with:
          ref: sync
      
      - name: Sync files to kubenode1
        run: |
          rsync -avz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            ./ andreas@kubenode1:/opt/configs/
