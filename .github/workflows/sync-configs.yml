name: Sync Configs to kubenode1

on:
  push:
    branches:
      - sync
  workflow_dispatch:

jobs:
  sync:
    runs-on: [self-hosted]
    
    steps:
      - name: Checkout sync branch
        uses: actions/checkout@v4
        with:
          ref: zphsyk67rw-tech/sync
      
      - name: Sync files to kubenode1
        run: |
          rsync -avz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            ./ andreas@kubenode1:/opt/configs/
            
  timestamp:
      runs-on: [self-hosted]
      needs: sync
    
      steps:
      - name: Write timestamp to remote file
        run: |
          ssh andreas@kubenode1 'date >> /opt/configs/synced.txt'
        
         
